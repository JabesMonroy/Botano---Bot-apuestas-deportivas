name: Actualizar datos

on:
  schedule:
    - cron: "0 11 * * *"   # diario 11:00 UTC (06:00 Colombia)
  workflow_dispatch: {}     # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: actualizar-datos
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install httpx python-dotenv pandas numpy scipy beautifulsoup4 lxml

      - name: Actualizar datos del Mundial y re-estimar fuerzas
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
        run: |
          python -m scripts.actualizar
          python -m scripts.ingestar_eventos || echo "ingestar_eventos falló; sigo sin los eventos nuevos"
          python -m scripts.estimar_fuerzas || echo "estimar_fuerzas falló; sigo con los datos actualizados"
          python -m scripts.calibrar_sesgo || echo "calibrar_sesgo falló; se mantiene la corrección anterior"

      - name: Subir la base de datos actualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bot.db data/modelos/
          if git diff --staged --quiet; then
            echo "Sin cambios que subir."
          else
            git commit -m "datos: actualización automática del Mundial"
            git push
          fi
